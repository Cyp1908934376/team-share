version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: teamshare-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teamshare-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: teamshare-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - teamshare-network

  # API Backend
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: teamshare-api-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    networks:
      - teamshare-network

  # Web Frontend
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: teamshare-web-prod
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - api
    networks:
      - teamshare-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: teamshare-nginx-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - teamshare-network

networks:
  teamshare-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

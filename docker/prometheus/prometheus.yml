global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'team-share-api'
    metrics_path: '/api/v1/monitoring/metrics'
    static_configs:
      - targets: ['api:4000']
        labels:
          service: 'api'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

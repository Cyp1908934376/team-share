apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: team-share
  labels:
    app: team-share
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-share
      component: web
  template:
    metadata:
      labels:
        app: team-share
        component: web
    spec:
      containers:
        - name: web
          image: team-share-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: team-share
spec:
  selector:
    app: team-share
    component: web
  ports:
    - port: 80
      targetPort: 80

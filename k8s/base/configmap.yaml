apiVersion: v1
kind: ConfigMap
metadata:
  name: team-share-config
  namespace: team-share
data:
  NODE_ENV: "production"
  PORT: "4000"
  CORS_ORIGIN: "https://team-share.example.com"
  MINIO_ENDPOINT: "minio.team-share.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_BUCKET: "team-share"
  REDIS_URL: "redis://redis.team-share.svc.cluster.local:6379"

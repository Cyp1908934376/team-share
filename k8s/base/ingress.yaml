apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-share-ingress
  namespace: team-share
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
  labels:
    app: team-share
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - team-share.example.com
      secretName: team-share-tls
  rules:
    - host: team-share.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80

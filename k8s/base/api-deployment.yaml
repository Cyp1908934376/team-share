apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: team-share
  labels:
    app: team-share
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-share
      component: api
  template:
    metadata:
      labels:
        app: team-share
        component: api
    spec:
      containers:
        - name: api
          image: team-share-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: team-share-config
            - secretRef:
                name: team-share-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: team-share
spec:
  selector:
    app: team-share
    component: api
  ports:
    - port: 4000
      targetPort: 4000
